<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flashlight">
<meta name="description" content="Real flashlight using device camera flash">
<meta name="theme-color" content="#000000">
<title>Real Flashlight</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;width:100%;overflow:hidden;font-family:system-ui,sans-serif;background:#000;touch-action:manipulation}

body{
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0a0a0a;
}

.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:30px;
  width:100%;
  height:100%;
  padding:20px;
}

.header{
  text-align:center;
  color:#fff;
}

.title{
  font-size:32px;
  font-weight:bold;
  margin-bottom:5px;
}

.subtitle{
  font-size:12px;
  color:#888;
  letter-spacing:2px;
}

.power-button{
  width:220px;
  height:220px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #222, #000);
  border:4px solid #222;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:100px;
  transition:all 0.08s ease;
  box-shadow:0 0 60px rgba(0,0,0,0.8), inset 0 0 40px rgba(255,255,255,0.05);
  position:relative;
  overflow:hidden;
  -webkit-user-select:none;
  user-select:none;
}

.power-button::before{
  content:'';
  position:absolute;
  top:8%;
  left:8%;
  width:35%;
  height:35%;
  background:radial-gradient(circle, rgba(255,255,255,0.15), transparent);
  border-radius:50%;
  pointer-events:none;
  z-index:1;
}

.power-button:active{
  transform:scale(0.92);
  box-shadow:0 0 80px rgba(0,0,0,0.9), inset 0 0 40px rgba(255,255,255,0.1);
}

.power-button.on{
  background:radial-gradient(circle at 35% 35%, #ffeb3b, #ffa500);
  border-color:#ffeb3b;
  box-shadow:0 0 120px rgba(255,235,59,0.8), inset 0 0 40px rgba(0,0,0,0.3);
  animation:glow 0.5s ease-out;
}

@keyframes glow{
  0%{box-shadow:0 0 60px rgba(255,235,59,0.4), inset 0 0 40px rgba(0,0,0,0.3)}
  100%{box-shadow:0 0 120px rgba(255,235,59,0.8), inset 0 0 40px rgba(0,0,0,0.3)}
}

.status-info{
  text-align:center;
  color:#aaa;
  font-size:13px;
  letter-spacing:1px;
  min-height:20px;
}

.status-info.active{
  color:#ffeb3b;
}

.status-info.error{
  color:#ff4444;
}

.controls{
  display:flex;
  gap:15px;
  flex-direction:column;
  align-items:center;
  width:100%;
  max-width:320px;
}

.slider-group{
  width:100%;
}

.slider-label{
  color:#888;
  font-size:11px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
  letter-spacing:2px;
  text-transform:uppercase;
}

.slider{
  width:100%;
  height:6px;
  border-radius:3px;
  background:#222;
  outline:none;
  -webkit-appearance:none;
  appearance:none;
  cursor:pointer;
}

.slider::-webkit-slider-thumb{
  -webkit-appearance:none;
  appearance:none;
  width:20px;
  height:20px;
  border-radius:50%;
  background:#ffeb3b;
  cursor:pointer;
  box-shadow:0 0 15px rgba(255,235,59,0.6);
  transition:box-shadow 0.2s;
}

.slider::-webkit-slider-thumb:active{
  box-shadow:0 0 25px rgba(255,235,59,0.8);
}

.slider::-moz-range-thumb{
  width:20px;
  height:20px;
  border-radius:50%;
  background:#ffeb3b;
  cursor:pointer;
  border:none;
  box-shadow:0 0 15px rgba(255,235,59,0.6);
  transition:box-shadow 0.2s;
}

.slider::-moz-range-thumb:active{
  box-shadow:0 0 25px rgba(255,235,59,0.8);
}

.mode-group{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  width:100%;
}

.mode-btn{
  background:#111;
  border:2px solid #333;
  color:#777;
  padding:12px 10px;
  border-radius:12px;
  cursor:pointer;
  font-size:11px;
  font-weight:bold;
  letter-spacing:1px;
  transition:all 0.15s;
  text-transform:uppercase;
  -webkit-user-select:none;
  user-select:none;
}

.mode-btn:active{
  transform:scale(0.93);
}

.mode-btn.active{
  background:#ffeb3b;
  border-color:#ffeb3b;
  color:#000;
  box-shadow:0 0 20px rgba(255,235,59,0.6);
}

.info-section{
  text-align:center;
  color:#666;
  font-size:11px;
  margin-top:20px;
  line-height:1.6;
}

.permission-btn{
  background:#ffeb3b;
  color:#000;
  border:none;
  padding:12px 24px;
  border-radius:8px;
  font-weight:bold;
  font-size:12px;
  cursor:pointer;
  letter-spacing:1px;
  transition:all 0.2s;
  margin-top:10px;
}

.permission-btn:active{
  transform:scale(0.95);
}

.debug-log{
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
  background:rgba(0,0,0,0.8);
  color:#0f0;
  font-size:9px;
  padding:8px;
  border-radius:4px;
  max-height:80px;
  overflow-y:auto;
  display:none;
  font-family:monospace;
  border:1px solid #0f0;
  z-index:9999;
}

@media (max-width: 480px) {
  .power-button{
    width:180px;
    height:180px;
    font-size:80px;
  }
  
  .title{
    font-size:24px;
  }
}

@media (orientation: landscape) {
  .container{
    flex-direction:row;
    gap:40px;
  }
  
  .power-button{
    width:180px;
    height:180px;
    font-size:80px;
  }
}
</style>
</head>
<body>

<div class="container">
  <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <div class="header">
      <div class="title">FLASHLIGHT</div>
      <div class="subtitle">REAL TORCH MODE</div>
    </div>
    
    <div class="power-button" id="powerBtn" onclick="handlePowerClick()">🔦</div>
    
    <div class="status-info" id="statusInfo">TAP TO START</div>
  </div>

  <div class="controls">
    <div class="slider-group">
      <div class="slider-label">
        <span>BRIGHTNESS</span>
        <span id="brightValue">100%</span>
      </div>
      <input type="range" id="brightnessSlider" class="slider" min="10" max="100" value="100" oninput="changeBrightness(this.value)">
    </div>

    <div class="mode-group">
      <button class="mode-btn active" id="normalBtn" onclick="switchMode('normal')">NORMAL</button>
      <button class="mode-btn" id="strobeBtn" onclick="switchMode('strobe')">STROBE</button>
      <button class="mode-btn" id="sosBtn" onclick="switchMode('sos')">SOS</button>
    </div>

    <div class="info-section" id="infoSection">
      Make sure camera permissions are granted
    </div>
    
    <button class="permission-btn" id="permBtn" onclick="requestCamera()" style="display:none;">GRANT CAMERA PERMISSION</button>
  </div>
</div>

<div class="debug-log" id="debugLog"></div>

<script>
// ── LOGGING FOR DEBUG ──────────────────────────
function log(msg) {
  console.log(msg);
  const debug = document.getElementById('debugLog');
  debug.innerHTML += msg + '<br>';
  debug.scrollTop = debug.scrollHeight;
}

// ── STATE ──────────────────────────────────────
let isOn = false;
let stream = null;
let videoTrack = null;
let currentMode = 'normal';
let brightness = 100;
let strobeInterval = null;
let sosTimeout = null;
let sosIndex = 0;
let wakeLock = null;

const sosPattern = [
  100,100,100, 100, 100,100,100, 100, 100,100,100, 300,
  300,300,300, 300, 300,300,300, 300, 300,300,300, 300,
  100,100,100, 100, 100,100,100, 100, 100,100,100, 600
];

// ── DOM ELEMENTS ───────────────────────────────
const powerBtn = document.getElementById('powerBtn');
const statusInfo = document.getElementById('statusInfo');
const infoSection = document.getElementById('infoSection');
const permBtn = document.getElementById('permBtn');
const brightnessSlider = document.getElementById('brightnessSlider');
const brightValue = document.getElementById('brightValue');

// ── CAMERA INITIALIZATION ──────────────────────
async function requestCamera() {
  log('📷 Requesting camera access...');
  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      throw new Error('Camera API not supported on this device');
    }

    // Request camera with explicit permissions
    const constraints = {
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    };

    stream = await navigator.mediaDevices.getUserMedia(constraints);
    log('✅ Camera stream obtained');

    videoTrack = stream.getVideoTracks()[0];
    if (!videoTrack) {
      throw new Error('No video track found');
    }

    log('✅ Video track found');
    
    const settings = videoTrack.getSettings();
    log('📊 Track settings: ' + JSON.stringify(settings));

    // Check capabilities
    const capabilities = videoTrack.getCapabilities();
    log('📋 Capabilities: ' + JSON.stringify(capabilities));

    if (!capabilities.torch) {
      throw new Error('Device does not support torch/flashlight');
    }

    log('✅ Torch support confirmed');

    // Successfully initialized
    permBtn.style.display = 'none';
    statusInfo.classList.remove('error');
    statusInfo.textContent = '✅ READY - TAP TO ACTIVATE';
    infoSection.textContent = 'Tap the button to turn on flashlight';

    // Keep camera running in background
    const video = document.createElement('video');
    video.srcObject = stream;
    video.play().catch(e => log('Video play error: ' + e));

  } catch (error) {
    log('❌ Error: ' + error.message);
    statusInfo.classList.add('error');
    statusInfo.textContent = '❌ ' + error.message;
    permBtn.style.display = 'block';
    infoSection.textContent = 'Tap button below to grant camera permission';
  }
}

// ── TORCH CONTROL ──────────────────────────────
async function enableTorch() {
  if (!videoTrack) {
    log('❌ No video track available');
    return false;
  }

  try {
    log('💡 Enabling torch...');
    
    const constraints = {
      advanced: [
        { torch: true }
      ]
    };

    await videoTrack.applyConstraints(constraints);
    log('✅ Torch enabled');
    return true;

  } catch (error) {
    log('❌ Failed to enable torch: ' + error.message);
    return false;
  }
}

async function disableTorch() {
  if (!videoTrack) return;

  try {
    log('💡 Disabling torch...');
    
    const constraints = {
      advanced: [
        { torch: false }
      ]
    };

    await videoTrack.applyConstraints(constraints);
    log('✅ Torch disabled');

  } catch (error) {
    log('❌ Failed to disable torch: ' + error.message);
  }
}

// ── BRIGHTNESS CONTROL ─────────────────────────
function changeBrightness(value) {
  brightness = parseInt(value);
  brightValue.textContent = brightness + '%';
  log('🔆 Brightness: ' + brightness + '%');
  
  // For real torch, brightness is limited by hardware
  // Most devices don't support brightness adjustment
}

// ── MODE CONTROL ────────────────────────────────
function switchMode(mode) {
  if (!isOn) {
    log('ℹ️ Turn on flashlight first');
    return;
  }

  clearAllTimers();
  currentMode = mode;
  
  document.getElementById('normalBtn').classList.remove('active');
  document.getElementById('strobeBtn').classList.remove('active');
  document.getElementById('sosBtn').classList.remove('active');

  switch(mode) {
    case 'normal':
      document.getElementById('normalBtn').classList.add('active');
      enableTorch();
      statusInfo.textContent = '🔦 NORMAL MODE';
      log('⚪ Normal mode');
      break;

    case 'strobe':
      document.getElementById('strobeBtn').classList.add('active');
      statusInfo.textContent = '⚡ STROBE MODE';
      log('⚡ Strobe mode started');
      runStrobe();
      break;

    case 'sos':
      document.getElementById('sosBtn').classList.add('active');
      statusInfo.textContent = '🆘 SOS MODE';
      log('🆘 SOS mode started');
      sosIndex = 0;
      runSOS();
      break;
  }
}

function runStrobe() {
  if (currentMode !== 'strobe' || !isOn) return;
  
  enableTorch();
  strobeInterval = setTimeout(() => {
    disableTorch();
    strobeInterval = setTimeout(() => {
      runStrobe();
    }, 100);
  }, 100);
}

function runSOS() {
  if (currentMode !== 'sos' || !isOn) return;

  if (sosIndex < sosPattern.length) {
    const duration = sosPattern[sosIndex];
    const isFlash = sosIndex % 2 === 0;

    if (isFlash) {
      enableTorch();
    } else {
      disableTorch();
    }

    sosIndex++;
    sosTimeout = setTimeout(runSOS, duration);
  } else {
    sosIndex = 0;
    sosTimeout = setTimeout(runSOS, 300);
  }
}

function clearAllTimers() {
  if (strobeInterval) clearTimeout(strobeInterval);
  if (sosTimeout) clearTimeout(sosTimeout);
  strobeInterval = null;
  sosTimeout = null;
}

// ── POWER BUTTON HANDLER ────────────────────────
async function handlePowerClick() {
  if (!videoTrack) {
    log('📷 Camera not initialized, requesting access...');
    await requestCamera();
    return;
  }

  if (!isOn) {
    // Turn on
    log('🔌 Turning ON flashlight...');
    const success = await enableTorch();
    
    if (success) {
      isOn = true;
      powerBtn.classList.add('on');
      statusInfo.classList.remove('error');
      statusInfo.textContent = '✅ FLASHLIGHT ON';
      document.getElementById('normalBtn').classList.add('active');
      log('✅ Flashlight ON');

      // Request wake lock
      if ('wakeLock' in navigator) {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
          log('🔒 Wake lock acquired');
        } catch(e) {
          log('Wake lock failed: ' + e);
        }
      }
    } else {
      statusInfo.classList.add('error');
      statusInfo.textContent = '❌ FAILED TO ENABLE TORCH';
    }
  } else {
    // Turn off
    log('🔌 Turning OFF flashlight...');
    await disableTorch();
    isOn = false;
    powerBtn.classList.remove('on');
    statusInfo.classList.remove('error');
    statusInfo.textContent = '✅ READY - TAP TO ACTIVATE';
    
    document.getElementById('normalBtn').classList.remove('active');
    document.getElementById('strobeBtn').classList.remove('active');
    document.getElementById('sosBtn').classList.remove('active');
    
    currentMode = 'normal';
    clearAllTimers();
    
    if (wakeLock) {
      try {
        await wakeLock.release();
        wakeLock = null;
        log('🔓 Wake lock released');
      } catch(e) {}
    }
    
    log('✅ Flashlight OFF');
  }
}

// ── PAGE VISIBILITY ────────────────────────────
document.addEventListener('visibilitychange', async () => {
  if (document.hidden) {
    if (isOn) {
      log('🔌 Page hidden, turning off torch');
      await disableTorch();
    }
  } else {
    if (isOn) {
      log('🔌 Page visible, re-enabling torch');
      await enableTorch();
    }
  }
});

// ── INITIALIZE ON LOAD ──────────────────────────
window.addEventListener('load', async () => {
  log('🚀 App loaded');
  log('🔍 Checking device capabilities...');
  
  if (!navigator.mediaDevices?.getUserMedia) {
    log('❌ Camera API not supported');
    statusInfo.classList.add('error');
    statusInfo.textContent = '❌ Camera not supported';
  } else {
    log('✅ Camera API available');
    log('📱 Tap the button to grant camera permission');
  }
});

// ── PREVENT SLEEP ──────────────────────────────
document.addEventListener('touchstart', () => {
  if (isOn && 'wakeLock' in navigator && !wakeLock) {
    navigator.wakeLock.request('screen').then(lock => {
      wakeLock = lock;
      log('🔒 Wake lock acquired');
    }).catch(err => log('Wake lock error: ' + err));
  }
});
</script>
</body>
</html>
