<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flashlight">
<meta name="description" content="Real flashlight app using your device's camera flash.">
<meta name="theme-color" content="#000000">
<title>Real Flashlight</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23000000' width='180' height='180'/><text x='90' y='120' font-size='80' font-weight='bold' fill='%23ffeb3b' text-anchor='middle' font-family='sans-serif'>🔦</text></svg>">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;width:100%;overflow:hidden;font-family:system-ui,sans-serif;background:#000}

body{
  display:flex;
  align-items:center;
  justify-content:center;
  background:#1a1a1a;
}

.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:40px;
  width:100%;
  height:100%;
  padding:20px;
}

.status{
  text-align:center;
  color:#fff;
  font-size:14px;
  letter-spacing:1px;
}

.status-dot{
  display:inline-block;
  width:10px;
  height:10px;
  border-radius:50%;
  margin-right:10px;
  background:#ff4444;
  animation:pulse-status 1s infinite;
}

.status-dot.active{
  background:#44ff44;
  animation:pulse-status-active 1s infinite;
}

@keyframes pulse-status{
  0%,100%{opacity:0.6}
  50%{opacity:1}
}

@keyframes pulse-status-active{
  0%,100%{opacity:1}
  50%{opacity:0.7}
}

.power-button{
  width:200px;
  height:200px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #333, #000);
  border:3px solid #333;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:80px;
  transition:all 0.1s ease;
  box-shadow:0 0 40px rgba(255,255,255,0.1), inset 0 0 20px rgba(0,0,0,0.5);
  position:relative;
  overflow:hidden;
}

.power-button::before{
  content:'';
  position:absolute;
  top:10%;
  left:10%;
  width:30%;
  height:30%;
  background:radial-gradient(circle, rgba(255,255,255,0.2), transparent);
  border-radius:50%;
  pointer-events:none;
}

.power-button:active{
  transform:scale(0.95);
  box-shadow:0 0 60px rgba(255,255,255,0.2), inset 0 0 20px rgba(0,0,0,0.5);
}

.power-button.on{
  background:radial-gradient(circle at 30% 30%, #ffeb3b, #ffa500);
  border-color:#ffeb3b;
  box-shadow:0 0 80px rgba(255,235,59,0.6), inset 0 0 20px rgba(0,0,0,0.5);
}

.controls{
  display:flex;
  gap:20px;
  flex-direction:column;
  align-items:center;
  width:100%;
  max-width:300px;
}

.brightness-section{
  width:100%;
}

.brightness-label{
  color:#aaa;
  font-size:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  letter-spacing:1px;
}

.brightness-slider{
  width:100%;
  height:8px;
  border-radius:4px;
  background:#333;
  outline:none;
  -webkit-appearance:none;
  appearance:none;
  cursor:pointer;
}

.brightness-slider::-webkit-slider-thumb{
  -webkit-appearance:none;
  appearance:none;
  width:20px;
  height:20px;
  border-radius:50%;
  background:#ffeb3b;
  cursor:pointer;
  box-shadow:0 0 10px rgba(255,235,59,0.5);
}

.brightness-slider::-moz-range-thumb{
  width:20px;
  height:20px;
  border-radius:50%;
  background:#ffeb3b;
  cursor:pointer;
  border:none;
  box-shadow:0 0 10px rgba(255,235,59,0.5);
}

.mode-buttons{
  display:flex;
  gap:10px;
  width:100%;
  justify-content:center;
  flex-wrap:wrap;
}

.mode-btn{
  background:#222;
  border:2px solid #333;
  color:#888;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
  font-size:12px;
  font-weight:bold;
  letter-spacing:1px;
  transition:all 0.2s;
  text-transform:uppercase;
}

.mode-btn:active{
  transform:scale(0.95);
}

.mode-btn.active{
  background:#ffeb3b;
  border-color:#ffeb3b;
  color:#000;
  box-shadow:0 0 20px rgba(255,235,59,0.5);
}

.info-text{
  color:#666;
  font-size:12px;
  text-align:center;
  margin-top:20px;
  letter-spacing:0.5px;
}

.error{
  color:#ff4444;
  background:#1a0000;
  padding:15px;
  border-radius:10px;
  text-align:center;
  font-size:12px;
  border:1px solid #330000;
}

.success{
  color:#44ff44;
  background:#001a00;
  padding:15px;
  border-radius:10px;
  text-align:center;
  font-size:12px;
  border:1px solid #003300;
}

#permission-warning{
  display:none;
  margin-top:20px;
}

@media (max-width: 480px) {
  .power-button{
    width:160px;
    height:160px;
    font-size:60px;
  }
  
  .controls{
    max-width:100%;
  }
}

@media (orientation: landscape) {
  .container{
    flex-direction:row;
    gap:60px;
  }
  
  .power-button{
    width:160px;
    height:160px;
    font-size:60px;
  }
}
</style>
</head>
<body>

<div class="container">
  <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;">
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">INITIALIZING...</span>
    </div>
    
    <div class="power-button" id="powerBtn" onclick="toggleFlash()">🔦</div>
  </div>

  <div class="controls">
    <div class="brightness-section">
      <div class="brightness-label">
        <span>BRIGHTNESS</span>
        <span id="brightDisplay">100%</span>
      </div>
      <input type="range" id="brightnessSlider" class="brightness-slider" min="10" max="100" value="100" oninput="updateBrightness(this.value)">
    </div>

    <div class="mode-buttons">
      <button class="mode-btn active" id="normalMode" onclick="setMode('normal')">NORMAL</button>
      <button class="mode-btn" id="strobeMode" onclick="setMode('strobe')">STROBE</button>
      <button class="mode-btn" id="sosMode" onclick="setMode('sos')">SOS</button>
    </div>

    <div id="permission-warning" class="error">
      ❌ Flash not available or permission denied
    </div>
    
    <div id="successMsg" class="success" style="display:none;">
      ✅ Flash is working!
    </div>

    <div class="info-text" id="infoText">
      TAP THE BUTTON TO TURN ON FLASHLIGHT
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────
let isFlashOn = false;
let torchTrack = null;
let currentMode = 'normal'; // normal, strobe, sos
let brightness = 100;
let strobeTimer = null;
let sosTimer = null;
let sosPattern = [100, 100, 100, 100, 100, 100, 300, 300, 300, 100, 300, 300, 300, 100, 100, 100, 100, 100, 100, 600];
let sosIndex = 0;
let wakeLock = null;

// ── DOM ───────────────────────────────────────────
const powerBtn = document.getElementById('powerBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const infoText = document.getElementById('infoText');
const brightnessSlider = document.getElementById('brightnessSlider');
const brightDisplay = document.getElementById('brightDisplay');
const permissionWarning = document.getElementById('permission-warning');
const successMsg = document.getElementById('successMsg');
const normalModeBtn = document.getElementById('normalMode');
const strobeModeBtn = document.getElementById('strobeMode');
const sosModeBtn = document.getElementById('sosMode');

// ── TORCH CONTROL ────────────────────────────────
async function initTorch() {
  try {
    if (!navigator.mediaDevices?.getUserMedia) {
      throw new Error('Camera API not supported');
    }

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }
    });

    const track = stream.getVideoTracks()[0];
    if (!track) throw new Error('No video track');

    const capabilities = track.getCapabilities ? track.getCapabilities() : {};
    
    if (!capabilities.torch) {
      throw new Error('Torch not supported on this device');
    }

    torchTrack = track;
    statusDot.classList.add('active');
    statusText.textContent = 'READY';
    permissionWarning.style.display = 'none';
    infoText.textContent = 'TAP TO ACTIVATE FLASHLIGHT';

    // Turn off torch by default
    await torchTrack.applyConstraints({
      advanced: [{ torch: false }]
    });

  } catch (error) {
    console.error('Torch init failed:', error);
    statusDot.classList.remove('active');
    statusText.textContent = 'NOT AVAILABLE';
    permissionWarning.style.display = 'block';
    permissionWarning.innerHTML = `❌ ${error.message}<br><br>Make sure:<br>• You're using HTTPS<br>• Camera permission is granted<br>• Device has a rear camera flash`;
    infoText.textContent = 'Real torch not available on this device';
  }
}

async function turnOnTorch() {
  if (!torchTrack) return false;
  try {
    await torchTrack.applyConstraints({
      advanced: [{ torch: true }]
    });
    return true;
  } catch (error) {
    console.error('Failed to turn on torch:', error);
    return false;
  }
}

async function turnOffTorch() {
  if (!torchTrack) return;
  try {
    await torchTrack.applyConstraints({
      advanced: [{ torch: false }]
    });
  } catch (error) {
    console.error('Failed to turn off torch:', error);
  }
}

// ── BRIGHTNESS CONTROL ──────────────────────────
function updateBrightness(value) {
  brightness = parseInt(value);
  brightDisplay.textContent = brightness + '%';
  
  // Brightness doesn't affect hardware torch, but we can simulate with opacity
  // For now, just update the display
}

// ── MODE CONTROL ────────────────────────────────
function setMode(mode) {
  if (!isFlashOn && mode !== 'normal') {
    infoText.textContent = 'Turn on flashlight first!';
    return;
  }

  // Clear previous timers
  if (strobeTimer) clearInterval(strobeTimer);
  if (sosTimer) clearTimeout(sosTimer);

  // Update buttons
  normalModeBtn.classList.remove('active');
  strobeModeBtn.classList.remove('active');
  sosModeBtn.classList.remove('active');

  currentMode = mode;

  switch(mode) {
    case 'normal':
      normalModeBtn.classList.add('active');
      turnOnTorch();
      infoText.textContent = 'Flashlight ON - Normal mode';
      break;

    case 'strobe':
      strobeModeBtn.classList.add('active');
      infoText.textContent = 'Strobe mode active';
      strobeTimer = setInterval(() => {
        if (isFlashOn) {
          turnOffTorch().then(() => setTimeout(turnOnTorch, 50));
        }
      }, 150);
      break;

    case 'sos':
      sosModeBtn.classList.add('active');
      sosIndex = 0;
      infoText.textContent = 'SOS signal active';
      runSOS();
      break;
  }
}

function runSOS() {
  if (currentMode !== 'sos' || !isFlashOn) return;

  if (sosIndex < sosPattern.length) {
    const duration = sosPattern[sosIndex];
    const isOn = sosIndex % 2 === 0;

    if (isOn) {
      turnOnTorch();
    } else {
      turnOffTorch();
    }

    sosIndex++;
    sosTimer = setTimeout(runSOS, duration);
  } else {
    sosIndex = 0;
    sosTimer = setTimeout(runSOS, 200);
  }
}

// ── MAIN TOGGLE ─────────────────────────────────
async function toggleFlash() {
  if (!torchTrack) {
    infoText.textContent = 'Torch not available';
    return;
  }

  if (isFlashOn) {
    // Turn off
    await turnOffTorch();
    isFlashOn = false;
    powerBtn.classList.remove('on');
    statusText.textContent = 'READY';
    infoText.textContent = 'Flashlight OFF';
    successMsg.style.display = 'none';

    // Clear timers
    if (strobeTimer) clearInterval(strobeTimer);
    if (sosTimer) clearTimeout(sosTimer);

    // Reset mode
    currentMode = 'normal';
    normalModeBtn.classList.add('active');
    strobeModeBtn.classList.remove('active');
    sosModeBtn.classList.remove('active');

    // Release wake lock
    if (wakeLock) {
      try { wakeLock.release(); } catch(e) {}
      wakeLock = null;
    }
  } else {
    // Turn on
    const success = await turnOnTorch();
    if (success) {
      isFlashOn = true;
      powerBtn.classList.add('on');
      statusText.textContent = 'ACTIVE';
      infoText.textContent = 'Flashlight ON';
      successMsg.style.display = 'block';

      // Request wake lock
      if ('wakeLock' in navigator) {
        try {
          wakeLock = await navigator.wakeLock.request('screen');
        } catch(e) {}
      }
    } else {
      infoText.textContent = 'Failed to turn on torch';
    }
  }
}

// ── INITIALIZATION ──────────────────────────────
window.addEventListener('load', () => {
  initTorch();
});

// ── VISIBILITY CHANGE ──────────────────────────
document.addEventListener('visibilitychange', async () => {
  if (document.hidden) {
    if (isFlashOn) {
      await turnOffTorch();
    }
  } else {
    if (isFlashOn) {
      await turnOnTorch();
    }
  }
});

// ── PREVENT SLEEP ──────────────────────────────
document.addEventListener('touchstart', () => {
  if ('wakeLock' in navigator && isFlashOn && !wakeLock) {
    navigator.wakeLock.request('screen').then(lock => {
      wakeLock = lock;
    }).catch(err => console.log(err));
  }
});
</script>
</body>
</html>
